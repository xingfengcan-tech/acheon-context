name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev,openai]"
      - run: python -m unittest discover -s tests -v
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m acheon.evals.run --output "${{ runner.temp }}/acheon-benchmark.json"
      - run: python scripts/verify_release.py --compare-benchmark "${{ runner.temp }}/acheon-benchmark.json"
      - if: matrix.python-version == '3.11'
        run: python scripts/generate_diagrams.py
      - if: matrix.python-version == '3.11'
        run: python scripts/build_release.py
      - if: matrix.python-version == '3.11'
        run: python scripts/verify_release.py --require-archive
